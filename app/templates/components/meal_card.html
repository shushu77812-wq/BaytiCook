<div class="meal-card">
  <!-- صورة الطبق -->
  <img src="/static/uploads/{{ meal.images[0].image if meal.images else 'no-image.png' }}" alt="صورة الطبق" style="width:100%; height:200px; object-fit:cover; border-radius:10px;">

  <!-- اسم الطبق -->
  <h3 style="margin:10px 0; color:#333;">{{ meal.name }}</h3>

  <!-- السعر -->
  <p class="price" style="font-weight:bold; color:#27ae60;">💰 {{ meal.price }} ريال</p>

  <!-- اسم المطبخ -->
  <p style="color:#555;">من مطبخ <strong>{{ meal.kitchen.kitchen_name }}</strong></p>

  <!-- أزرار التحكم -->
  <div style="margin-top:10px;">
    <a href="/meal/{{ meal.id }}">
      <button class="details-btn" style="background:#3498db; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">
        👁️ عرض التفاصيل
      </button>
    </a>

    <form action="/add-to-cart/{{ meal.id }}" method="POST" style="display:inline;">
      <button type="submit" style="background:#27ae60; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">
        🛒 أضف للسلة
      </button>
    </form>
  </div>
</div>
