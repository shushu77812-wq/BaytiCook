<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تعديل الطبق</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chefs.css') }}">
  <style>
    body { font-family: Tahoma, sans-serif; background:#f4f4f4; margin:0; }
    .sidebar { width:220px; background:#333; color:#fff; padding:20px; float:right; height:100vh; }
    .sidebar a { display:block; color:#fff; padding:10px; text-decoration:none; margin:5px 0; }
    .sidebar a:hover { background:#444; }
    .content { margin-right:240px; padding:20px; }
    .edit-form {
      background:#fff;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }
    .edit-form input, .edit-form textarea {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }
    .edit-form button {
      background:#3498db;
      color:white;
      padding:10px 20px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    .edit-form button:hover { background:#2980b9; }
    .images-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
      gap:15px;
      margin-top:15px;
    }
    .images-grid img {
      max-width:100%;
      border-radius:6px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
    .btn-delete {
      display:block;
      background:#e74c3c;
      color:white;
      text-align:center;
      padding:5px;
      border-radius:6px;
      margin-top:5px;
      text-decoration:none;
    }
    .btn-delete:hover { background:#c0392b; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>👩‍🍳 لوحة الطاهية</h2>
    <a href="/dashboard">الرئيسية</a>
    <a href="/meals">الأطباق</a>
    <a href="/orders">الطلبات</a>
    <a href="/logout">تسجيل خروج</a>
  </div>

  <!-- Content -->
  <div class="content">
    <h1>✏️ تعديل الطبق: {{ meal.name }}</h1>

    <!-- نموذج تعديل الطبق -->
    <div class="edit-form">
      <form method="POST" enctype="multipart/form-data">
        <label>اسم الطبق</label>
        <input type="text" name="name" value="{{ meal.name }}" required>

        <label>الوصف</label>
        <textarea name="description" rows="4" required>{{ meal.description }}</textarea>

        <label>السعر</label>
        <input type="number" name="price" value="{{ meal.price }}" required>

        <label>إضافة صور جديدة</label>
        <input type="file" name="images" accept="image/*" multiple>

        <button type="submit">💾 حفظ التعديلات</button>
      </form>
    </div>

    <!-- الصور الحالية -->
    <h3>📸 الصور الحالية</h3>
    <div class="images-grid">
      {% for img in meal.images %}
        <div>
          <img src="{{ url_for('static', filename='uploads/' ~ img.image) }}" alt="صورة الطبق">
          <a href="/meals/delete-image/{{ img.id }}" class="btn-delete"
             onclick="return confirm('هل أنت متأكد من حذف هذه الصورة؟')">🗑️ حذف</a>
        </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
