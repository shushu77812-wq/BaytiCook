<!DOCTYPE html>
<html lang="en">
  <style>
    body {
    font-family: "Tahoma", sans-serif;
    background: #fafafa;
    direction: rtl;
    text-align: center;
}

.container {
    width: 350px;
    margin: 70px auto;
    padding: 20px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px #ccc;
}

h2 {
    margin-bottom: 20px;
    color: #333;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
}

button {
    background: #FF9800;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #F57C00;
}

.flash-messages {
    margin-bottom: 15px;
}

.alert {
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    font-size: 14px;
}

.alert-success { background: #d4edda; color: #155724; }
.alert-danger { background: #f8d7da; color: #721c24; }
.alert-warning { background: #fff3cd; color: #856404; }
.alert-info    { background: #d1ecf1; color: #0c5460; }

  </style>
<head>
    <meta charset="UTF-8">
    <title>تعين كلمة مرور جديده</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>
<body>
    <form method="POST">
  <h2>نسيت كلمة المرور</h2>
  <label>رقم الهاتف</label>
  <input type="text" name="phone" required>
  <button type="submit">إرسال رمز تحقق</button>
</form>

</body>
</html>
