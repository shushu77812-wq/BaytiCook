<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>السلة</title>

<style>
/* نفس تصميمك بدون تغيير */
body{
    font-family:Tahoma;
    background:#dbcfcf;
    padding:20px;
}
h2{text-align:center;}
.cart-box{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,0.1);
}
.kitchen-title{
    background:#f1f1f1;
    padding:10px;
    border-radius:8px;
    margin-top:15px;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:10px;
}
.kitchen-title img{
    width:40px;height:40px;border-radius:50%;object-fit:cover;
}
.item{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid #eee;padding:15px 0;
}
.item img{
    width:80px;height:80px;border-radius:10px;object-fit:cover;
}
.info{flex:1;margin:0 15px;}
.actions a{margin:0 5px;text-decoration:none;font-size:20px;}
.total{text-align:center;font-size:22px;margin-top:20px;font-weight:bold;}
.checkout{
    display:block;width:100%;padding:12px;background:#27ae60;
    color:white;border:none;border-radius:8px;cursor:pointer;margin-top:15px;
}
.back{text-align:center;display:block;margin-top:15px;color:#3498db;}
.empty{text-align:center;color:gray;margin-top:50px;}
.subtotal{text-align:right;font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<h2>🛒 السلة</h2>

<div class="cart-box">

{% if meals %}

    {% for meal in meals %}

    <div class="item">

        {% if meal.images %}
            <img src="{{ url_for('static', filename='uploads/' + meal.images[0].image) }}">
        {% else %}
            <img src="{{ url_for('static', filename='uploads/no-image.png') }}">
        {% endif %}

        <div class="info">
            <h3>{{ meal.name }}</h3>
            <p>الكمية: {{ meal.quantity }}</p>
            <p>الإجمالي: {{ meal.price * meal.quantity }} ريال</p>
        </div>

        <div class="actions">
            <a href="/remove-from-cart/{{ meal.id }}">❌</a>
        </div>

    </div>

    {% endfor %}

    <div class="total">
        الإجمالي الكلي: {{ total_price }} ريال
    </div>

    <form method="POST" action="/checkout">
        <button type="submit" class="checkout">
            تأكيد الطلب
        </button>
    </form>

    <a href="/" class="back">⬅ الرجوع</a>

{% else %}
    <div class="empty">
        <h3>😢 السلة فارغة</h3>
        <a href="/" class="back">⬅ الرجوع</a>
    </div>
{% endif %}

</div>

</body>
</html>
